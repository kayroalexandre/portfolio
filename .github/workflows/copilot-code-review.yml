name: Copilot Code Review Companion

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review-reminder:
    name: Post Code Review Reminder
    runs-on: ubuntu-latest
    steps:
      - name: Post review checklist
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const body = [
              "Checklist de Code Review (Copilot Companion):",
              "",
              "- Analise impacto funcional e risco de regressao.",
              "- Revise validacao de input e tratamento de erro.",
              "- Confirme cobertura de testes para caminhos principais.",
              "- Verifique performance e acessibilidade quando aplicavel.",
              "",
              "Use o Copilot Chat para aprofundar pontos especificos da PR.",
              "Referencia: https://docs.github.com/pt/copilot/concepts/agents/code-review"
            ].join("\\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
