name: Prepare Release Branch

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Generate changelog and release branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run validate

      - name: Plan release
        id: plan
        run: |
          node scripts/release-planner.js --write > release-plan.json
          cat release-plan.json

      - name: Read release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=release/v$VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.version.outputs.branch }}"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): prepare v${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.branch }}"

      - name: Open release PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const branch = '${{ steps.version.outputs.branch }}';
            const body = `## Release v${version}\n\nThis PR promotes the release branch into \`main\`.\n\n### Contents\n- Changelog updated\n- Version bumped\n- Ready for production validation\n\n### Policy\n- Feature and bugfix branches merge into \`develop\` first\n- Only release-ready \`develop\` content may merge into \`main\``;

            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              base: 'main'
            });

            if (existing.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Release v${version}`,
                head: branch,
                base: 'main',
                body
              });
            }
