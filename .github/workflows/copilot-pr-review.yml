name: Copilot PR Review Assist

"on":
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review-note:
    name: Add Copilot Review Guidance
    runs-on: ubuntu-latest
    steps:
      - name: Add guidance comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Copilot PR Assist:",
              "",
              "- Gere um resumo inicial com o Copilot na descricao da PR.",
              "- Solicite revisao focada em regressao, seguranca e testes.",
              "- Valide localmente: npm run lint, npm run type-check, npm run test -- --run, npm run build.",
              "",
              "Referencia oficial: https://docs.github.com/pt/copilot/how-tos/copilot-on-github"
            ].join("\\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
