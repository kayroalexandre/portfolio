pre-commit:
  commands:
    format:
      glob: "*.{ts,tsx,css,json,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

prepare-commit-msg:
  commands:
    copilot-commit-suggestion:
      run: '[ -n "${COPILOT_COMMIT_SUGGEST:-}" ] && ./scripts/copilot-commit-suggestion.sh || true'